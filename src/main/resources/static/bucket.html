<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini S3 Bucket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard.html">Mini S3</a>
        <button class="btn btn-outline-light btn-sm" id="logoutButton">Logout</button>
    </div>
</nav>
<main class="container py-4">
    <div id="alert" class="alert d-none"></div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1" id="bucketTitle">Bucket</h1>
            <div class="text-muted" id="bucketMeta"></div>
        </div>
        <a class="btn btn-outline-secondary" href="/dashboard.html">Back</a>
    </div>
    <div class="row g-4">
        <section class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="h5">Upload File</h2>
                    <form id="uploadForm">
                        <input class="form-control mb-3" id="fileInput" type="file" required>
                        <button class="btn btn-primary" type="submit">Upload</button>
                    </form>
                </div>
            </div>
        </section>
        <section class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="d-flex gap-2 justify-content-between align-items-center mb-3">
                        <h2 class="h5 mb-0">Files</h2>
                        <input class="form-control form-control-sm" id="searchInput" style="max-width: 240px;" placeholder="Search files">
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                            <tr>
                                <th>Name</th>
                                <th>Size</th>
                                <th>Type</th>
                                <th></th>
                            </tr>
                            </thead>
                            <tbody id="fileTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>
<script src="/js/app.js"></script>
</body>
</html>
