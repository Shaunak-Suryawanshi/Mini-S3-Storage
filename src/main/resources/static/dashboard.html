<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini S3 Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard.html">Mini S3</a>
        <button class="btn btn-outline-light btn-sm" id="logoutButton">Logout</button>
    </div>
</nav>
<main class="container py-4">
    <div id="alert" class="alert d-none"></div>
    <div class="row g-4">
        <section class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="h5">Create Bucket</h2>
                    <form id="bucketForm">
                        <div class="mb-3">
                            <label class="form-label" for="bucketName">Bucket name</label>
                            <input class="form-control" id="bucketName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="visibility">Visibility</label>
                            <select class="form-select" id="visibility">
                                <option value="PRIVATE">PRIVATE</option>
                                <option value="PUBLIC">PUBLIC</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" type="submit">Create</button>
                    </form>
                </div>
            </div>
        </section>
        <section class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2 class="h5 mb-0">Buckets</h2>
                        <button class="btn btn-outline-secondary btn-sm" id="refreshBuckets">Refresh</button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                            <tr>
                                <th>Name</th>
                                <th>Visibility</th>
                                <th>Created</th>
                                <th></th>
                            </tr>
                            </thead>
                            <tbody id="bucketTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>
<script src="/js/app.js"></script>
</body>
</html>
