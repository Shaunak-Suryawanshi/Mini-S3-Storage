spring.application.name=MINI_S3
server.port=8081

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mini_s3}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:mini-s3-development-secret-key-change-this-before-production}
jwt.expiration=${JWT_EXPIRATION:86400000}
